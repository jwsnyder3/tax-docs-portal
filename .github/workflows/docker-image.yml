name: Backend Docker CI

on:
  pull_request:

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto' # 'corretto'
          java-version: '21'
          cache: 'gradle'

      - name: Build
        run: gradle build --no-daemon
