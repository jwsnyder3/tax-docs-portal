services:
  gateway:
    environment:
      DEFAULT_HOST: localhost
    image: nginxproxy/nginx-proxy:1.6.0
    ports:
      - 80:80
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      ENV: development
      PORT: 5173
      VIRTUAL_HOST: localhost
      VIRTUAL_PROTO: http
      VIRTUAL_PATH: /
      VITE_API_URL: '/api'
    expose:
      - 5173
    tty: true
    extra_hosts:
      - host.docker.internal:host-gateway
    # ports:
    #   - 5173:5173
    volumes:
      - ./frontend:/home/node/app

  backend:
    build:
      context: ./backend
      target: development
    environment:
      SERVER_PORT: 80
      SPRING_DATASOURCE_DRIVERCLASSNAME: org.postgresql.Driver
      SPRING_DATASOURCE_PASSWORD: super
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_PROFILES_ACTIVE: local
      SERVER_SERVLET_CONTEXT_PATH: /api
      VIRTUAL_HOST: localhost
      VIRTUAL_PROTO: http
      VIRTUAL_PATH: /api
    tty: true
    extra_hosts:
      - host.docker.internal:host-gateway
    expose:
      - 80
    # ports:
    #   - 80:80
    volumes:
      - ./backend:/usr/local/app
      - gradle-cache:/home/gradle/.gradle

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: super
    ports:
      - 5432:5432
    volumes:
      - ./database/setup.sql:/docker-entrypoint-initdb.d/setup.sql
      # - postgres:/var/lib/postgresql/data

  playwright:
    image: mcr.microsoft.com/playwright:v1.50.0-jammy
    working_dir: /app
    profiles: ["test"]
    volumes:
      - ./tests:/app
      - playwright-node-modules:/app/node_modules
    depends_on:
      - frontend
      - backend
    environment:
      - BASE_URL=http://frontend:5173
    command: >
      sh -c "
        npm ci &&
        npx wait-on http://frontend:5173 http://backend:80/health &&
        npx playwright test
      "

volumes:
  gradle-cache:
  playwright-node-modules:
  # postgres:
